<!-- Locate your telemetry action section and replace it with this dual-button set -->
<div class="control-panel">
    <button id="startBtn" onclick="toggleTelemetry(true)" style="background-color: #28a745; color: white;">Start Green Telemetry</button>
    <button id="stopBtn" onclick="toggleTelemetry(false)" style="background-color: #dc3545; color: white;" disabled>Stop Telemetry</button>
</div>

<script>
let telemetryInterval = null;

function toggleTelemetry(shouldStart) {
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusText = document.getElementById('gateStatus') || document.querySelector('.gate-status-block');

    if (shouldStart) {
        startBtn.disabled = true;
        stopBtn.disabled = false;
        if(statusText) statusText.innerText = "ACTIVE";
        
        // Snap poll updates cleanly every 500ms
        telemetryInterval = setInterval(() => {
            fetch('http://127.0.0.1:8082')
                .then(response => response.json())
                .then(data => {
                    // Update your dashboard metric text IDs here
                    if(document.getElementById('pueValue')) document.getElementById('pueValue').innerText = data.pue.toFixed(3);
                    if(document.getElementById('opexValue')) document.getElementById('opexValue').innerText = "$" + data.opex.toFixed(2);
                    if(document.getElementById('exhaustValue')) document.getElementById('exhaustValue').innerText = data.exhaust.toFixed(1) + "°C";
                    if(document.getElementById('countValue')) document.getElementById('countValue').innerText = data.count;
                })
                .catch(err => {
                    console.log("Pipeline read idle...", err);
                });
        }, 500);
    } else {
        // CLEAN BREAK ROUTINE: Clears the background poll completely so it never hangs
        clearInterval(telemetryInterval);
        telemetryInterval = null;
        
        startBtn.disabled = false;
        stopBtn.disabled = true;
        if(statusText) statusText.innerText = "OFFLINE";
        printf("[UI] Data pipeline disconnected safely.");
    }
}
</script>
