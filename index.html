    <script>
        let totalPackets = 0;
        let admittedPackets = 0;
        let totalOpexSavings = 377.50;
        let networkPollInterval = null;
        
        const logBox = document.getElementById('telemetry-log');

        const breedNames = {
            1: "Linux System Log Cluster",
            2: "Raw HTML Stream Parser",
            3: "Compiled C++ Memory Payload"
        };

        function writeToConsole(message, type = '') {
            const timestamp = new Date().toLocaleTimeString();
            let cls = type === 'pass' ? 'class="pass"' : type === 'fail' ? 'class="fail"' : 'class="sys"';
            logBox.innerHTML += `[${timestamp}] <span ${cls}>${message}</span><br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function toggleSluiceCheck() {
            const btn = document.getElementById('btn-master');
            const statusLabel = document.getElementById('metric-status');
            
            if (statusLabel.innerText === "OFFLINE" || statusLabel.innerText === "DISCONNECTED") {
                statusLabel.innerText = "STANDBY";
                statusLabel.className = "metric";
                btn.innerText = "■ Stop Engine Check";
                btn.className = "btn-red";
                writeToConsole("⚙️ Sluice monitoring connection loop engaged.");
                
                const targetEndpoint = document.getElementById('cfg-url').value;
                // Polls the Language Bridge API directly to read genuine C hardware states
                networkPollInterval = setInterval(() => fetchRealHardwareTelemetry(targetEndpoint), 1000);
            } else {
                statusLabel.innerText = "OFFLINE";
                statusLabel.className = "metric status-offline";
                btn.innerText = "▶ Start Green Telemetry";
                btn.className = "btn-green";
                writeToConsole("🛑 Sluice data stream listener paused manually.");
                
                clearInterval(networkPollInterval);
            }
        }

        function executeHardwareProbe() {
            writeToConsole("⚡ Diagnostic Command Sent: Triggering full array loop boundary line check...");
        }

        async function fetchRealHardwareTelemetry(endpoint) {
            try {
                const response = await fetch(endpoint);
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                totalPackets++;
                
                let isPassed = data.verdict === 1;
                if (isPassed) {
                    admittedPackets++;
                    totalOpexSavings += 0.45;
                }

                // UI Elements now render PURELY based on your C-backend's returned JSON strings
                document.getElementById('metric-total').innerText = totalPackets;
                document.getElementById('metric-ratio').innerText = ((admittedPackets / totalPackets) * 100).toFixed(1) + "%";
                
                const statusLabel = document.getElementById('metric-status');
                statusLabel.innerText = isPassed ? "INGRESSING" : "THROTTLED";
                statusLabel.className = isPassed ? "metric status-active" : "metric status-offline";
                
                document.getElementById('metric-savings').innerText = "$" + totalOpexSavings.toFixed(2);
                document.getElementById('metric-pue').innerText = (1.0 + (data.amplitude * 0.1)).toFixed(3);
                document.getElementById('metric-thermal').innerText = (25.0 - (data.amplitude * 30.0)).toFixed(1) + "°C";

                const breedLabel = breedNames[data.breed] || "Unknown Polymorphic Breed";
                
                if (isPassed) {
                    writeToConsole(`[PERMITTED] ${breedLabel} accepted. Size: ${data.measured_length}B | Resonance Factor: ${(data.amplitude * 100).toFixed(0)}%`, 'pass');
                } else {
                    writeToConsole(`[DISCARDED] ${breedLabel} size verification boundaries broken. Deflected.`, 'fail');
                }
            } catch (error) {
                document.getElementById('metric-status').innerText = "DISCONNECTED";
                document.getElementById('metric-status').className = "metric status-offline";
            }
        }

        writeToConsole("System Monitoring Interface Online. Configure your wire parameters and tap Start Green Telemetry.");
    </script>
